<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(135deg, #000000 0%, #2d004d 100%); 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Sparkle container overlay */
        .sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: blink 3s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            position: relative;
            z-index: 2;
        }

        h1 { 
            margin-bottom: 40px; 
            font-weight: 600; 
            letter-spacing: -0.5px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .button-group { display: flex; flex-direction: column; gap: 15px; }
        
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            background: rgba(18, 18, 18, 0.7); 
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 500; 
            cursor: pointer; 
            text-decoration: none; 
            backdrop-filter: blur(10px);
            transition: background 0.2s, border-color 0.2s, transform 0.2s; 
        }
        
        .btn:hover { 
            background: rgba(30, 30, 30, 0.8); 
            border-color: rgba(168, 85, 247, 0.5); 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="sparkles">
        <div class="sparkle" style="top: 15%; left: 20%; width: 4px; height: 4px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 25%; left: 75%; width: 6px; height: 6px; animation-delay: 1.2s;"></div>
        <div class="sparkle" style="top: 45%; left: 10%; width: 3px; height: 3px; animation-delay: 0.2s;"></div>
        <div class="sparkle" style="top: 65%; left: 85%; width: 5px; height: 5px; animation-delay: 2s;"></div>
        <div class="sparkle" style="top: 80%; left: 30%; width: 4px; height: 4px; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 10%; left: 60%; width: 5px; height: 5px; animation-delay: 0.8s;"></div>
        <div class="sparkle" style="top: 55%; left: 65%; width: 3px; height: 3px; animation-delay: 2.3s;"></div>
        <div class="sparkle" style="top: 85%; left: 70%; width: 6px; height: 6px; animation-delay: 0.7s;"></div>
    </div>

    <div class="container">
        <h1>Dashboard</h1>
        <div class="button-group">
            <a href="projects.html" class="btn">View Projects List</a>
            <a href="idea.html" class="btn">Go to Idea Page</a>
        </div>
    </div>

</body>
</html>
