<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        h1 { margin-bottom: 40px; font-weight: 600; }
        .button-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: block; width: 100%; padding: 16px; background: #121212; color: #ffffff; border: 1px solid #222; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s, border-color 0.2s; }
        .btn:hover { background: #1a1a1a; border-color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>
        <div class="button-group">
            <a href="projects.html" class="btn">View Projects List</a>
            <a href="idea.html" class="btn">Go to Idea Page</a>
        </div>
    </div>
</body>
</html>
