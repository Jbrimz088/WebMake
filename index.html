<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100%;
            background-color: #000000;
        }

        body { 
            background: linear-gradient(135deg, #000000 0%, #2d004d 100%) fixed; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            min-height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: blink 3s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            position: relative;
            z-index: 2;
        }

        h1 { 
            margin-bottom: 40px; 
            font-weight: 600; 
            letter-spacing: -0.5px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .button-group { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }
        
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            background: rgba(18, 18, 18, 0.7); 
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 500; 
            cursor: pointer; 
            text-decoration: none; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.2s, border-color 0.2s, transform 0.2s; 
        }
        
        .btn:hover { 
            background: rgba(30, 30, 30, 0.8); 
            border-color: rgba(168, 85, 247, 0.5); 
        }

        /* Unique Floating Animations with custom shadow drops */
        .btn-projects {
            animation: floatLeft 6s infinite ease-in-out;
            box-shadow: 5px 12px 20px rgba(0, 0, 0, 0.6), 0px 0px 12px rgba(168, 85, 247, 0.1);
        }

        .btn-idea {
            animation: floatRight 7s infinite ease-in-out;
            box-shadow: -5px 14px 22px rgba(0, 0, 0, 0.6), 0px 0px 12px rgba(168, 85, 247, 0.1);
        }

        @keyframes floatLeft {
            0%, 100% {
                transform: translateY(0) rotate(-0.5deg);
                box-shadow: 4px 10px 18px rgba(0, 0, 0, 0.6);
            }
            50% {
                transform: translateY(-6px) rotate(0.8deg);
                box-shadow: 8px 18px 28px rgba(0, 0, 0, 0.7), 0 0 15px rgba(168, 85, 247, 0.2);
            }
        }

        @keyframes floatRight {
            0%, 100% {
                transform: translateY(0) rotate(0.6deg);
                box-shadow: -4px 12px 18px rgba(0, 0, 0, 0.6);
            }
            50% {
                transform: translateY(-7px) rotate(-0.7deg);
                box-shadow: -8px 20px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(168, 85, 247, 0.2);
            }
        }
    </style>
</head>
<body>

    <div class="sparkles">
        <div class="sparkle" style="top: 10%; left: 15%; width: 4px; height: 4px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 22%; left: 80%; width: 5px; height: 5px; animation-delay: 1.2s;"></div>
        <div class="sparkle" style="top: 40%; left: 8%; width: 3px; height: 3px; animation-delay: 0.2s;"></div>
        <div class="sparkle" style="top: 60%; left: 88%; width: 5px; height: 5px; animation-delay: 2s;"></div>
        <div class="sparkle" style="top: 78%; left: 25%; width: 4px; height: 4px; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 5%; left: 55%; width: 5px; height: 5px; animation-delay: 0.8s;"></div>
        <div class="sparkle" style="top: 52%; left: 70%; width: 3px; height: 3px; animation-delay: 2.3s;"></div>
        <div class="sparkle" style="top: 90%; left: 65%; width: 6px; height: 6px; animation-delay: 0.7s;"></div>
    </div>

    <div class="container">
        <h1>Dashboard</h1>
        <div class="button-group">
            <a href="projects.html" class="btn btn-projects">View Projects List</a>
            <a href="idea.html" class="btn btn-idea">Go to Idea Page</a>
        </div>
    </div>

</body>
</html>
