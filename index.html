<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #000; }
        body { 
            background: linear-gradient(135deg, #000 0%, #2d004d 100%) fixed; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .sparkles { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }
        .sparkle { position: absolute; background: #fff; border-radius: 50%; animation: blink 3s infinite ease-in-out; opacity: 0; }
        @keyframes blink { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } }
        .container { width: 100%; max-width: 600px; text-align: center; position: relative; z-index: 2; }
        h1 { margin-bottom: 40px; text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .button-group { display: flex; flex-direction: column; gap: 25px; }
        .btn { 
            display: block; width: 100%; padding: 16px; 
            background: rgba(18, 18, 18, 0.7); color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; 
            font-size: 16px; font-weight: 500; text-decoration: none; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        /* High visibility, higher speed, and larger rotation/translation adjustments */
        .btn-projects { 
            will-change: transform; 
            animation: fL 2s infinite ease-in-out; 
            box-shadow: 5px 12px 20px rgba(0,0,0,0.6); 
        }
        .btn-idea { 
            will-change: transform; 
            animation: fR 2.2s infinite ease-in-out; 
            box-shadow: -5px 14px 22px rgba(0,0,0,0.6); 
        }
        
        @keyframes fL {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2.5deg); box-shadow: 12px 25px 35px rgba(0,0,0,0.7), 0 0 20px rgba(168, 85, 247, 0.3); }
        }
        @keyframes fR {
            0%, 100% { transform: translateY(0) rotate(2.5deg); }
            50% { transform: translateY(-16px) rotate(-2deg); box-shadow: -12px 28px 38px rgba(0,0,0,0.7), 0 0 20px rgba(168, 85, 247, 0.3); }
        }
    </style>
</head>
<body>
    <div class="sparkles">
        <div class="sparkle" style="top: 10%; left: 15%; width: 4px; height: 4px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 22%; left: 80%; width: 5px; height: 5px; animation-delay: 1.2s;"></div>
        <div class="sparkle" style="top: 40%; left: 8%; width: 3px; height: 3px; animation-delay: 0.2s;"></div>
        <div class="sparkle" style="top: 60%; left: 88%; width: 5px; height: 5px; animation-delay: 2s;"></div>
        <div class="sparkle" style="top: 78%; left: 25%; width: 4px; height: 4px; animation-delay: 1.5s;"></div>
    </div>
    <div class="container">
        <h1>Dashboard</h1>
        <div class="button-group">
            <a href="projects.html" class="btn btn-projects">View Sites/Projects List</a>
            <a href="idea.html" class="btn btn-idea">Make a Site!</a>
        </div>
    </div>
</body>
</html>
