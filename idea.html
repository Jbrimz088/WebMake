<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            color: #007aff;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .card {
            background: #121212;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 24px;
            line-height: 1.6;
        }

        p {
            color: #aaa;
            margin-bottom: 16px;
        }

        p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">&larr; Back to Dashboard</a>
        <h1>Idea Workspace</h1>
        
        <div class="card">
            <p><strong>Project Concept:</strong> Insert your primary project details, brainstorming notes, or upcoming milestones here.</p>
            <p>This page acts as a scratchpad for tracking ideas before you implement them into full HTML projects inside your dedicated folder.</p>
        </div>
    </div>

</body>
</html>
