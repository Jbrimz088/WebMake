<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form UI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .back-btn {
            align-self: flex-start;
            max-width: 740px;
            width: 100%;
            margin: 0 auto 20px auto;
            color: #007aff;
            text-decoration: none;
            font-size: 14px;
        }

        .form-container {
            width: 100%;
            max-width: 740px;
            background: #121212;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
            border: 1px solid #222;
        }

        iframe {
            width: 100%;
            height: 80vh;
            border: none;
            display: block;
        }

        .loading {
            color: #888;
            text-align: center;
            font-size: 14px;
            position: absolute;
            z-index: -1;
        }
    </style>
</head>
<body>

    <a href="../WebMake/index.html" class="back-btn">&larr; Back to Dashboard</a>

    <div class="loading">Loading Form...</div>

    <div class="form-container">
        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSeqUQp9hNJtKa9qlW8iYnxZrskzxdABsr8SEyIN6LG8WqwDOw/viewform?embedded=true" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0">
            Loading…
        </iframe>
    </div>

</body>
</html>
