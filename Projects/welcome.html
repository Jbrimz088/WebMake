<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Welcome</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #000; }
        body { 
            background: linear-gradient(135deg, #000 0%, #2d004d 100%) fixed; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .sparkles { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }
        .sparkle { position: absolute; background: #fff; border-radius: 50%; animation: blink 3s infinite ease-in-out; opacity: 0; }
        @keyframes blink { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } }
        
        .container { width: 100%; max-width: 600px; text-align: center; position: relative; z-index: 2; }
        
        h1 { 
            font-size: 3rem;
            margin-bottom: 10px; 
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); 
        }
        
        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="sparkles">
        <div class="sparkle" style="top: 15%; left: 10%; width: 4px; height: 4px; animation-delay: 0.3s;"></div>
        <div class="sparkle" style="top: 28%; left: 85%; width: 5px; height: 5px; animation-delay: 1.1s;"></div>
        <div class="sparkle" style="top: 45%; left: 12%; width: 3px; height: 3px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 65%; left: 78%; width: 6px; height: 6px; animation-delay: 1.8s;"></div>
        <div class="sparkle" style="top: 80%; left: 22%; width: 4px; height: 4px; animation-delay: 1.2s;"></div>
    </div>

    <div class="container">
        <h1>Welcome</h1>
        <p>Your creative workspace awaits.</p>
    </div>
</body>
</html>
