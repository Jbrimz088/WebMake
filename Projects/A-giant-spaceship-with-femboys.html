<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catgirl Rocket in the Clouds</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #1a0b2e, #4c1c5c, #963d74);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Stars Background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starScroll 20s linear infinite;
        }

        @keyframes starScroll {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 0 1000px, 40px 1060px, 130px 1270px; }
        }

        /* Rocket Container with Hover/Flight Animation */
        .rocket-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float 4s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* Rocket Body Parts */
        .rocket-body {
            position: relative;
            width: 120px;
            height: 250px;
            background: linear-gradient(to right, #e6e6e6, #ffffff, #cccccc);
            border-radius: 50% 50% 10px 10px / 70% 70% 10px 10px;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.15);
        }

        /* Fins */
        .fin {
            position: absolute;
            bottom: 10px;
            width: 40px;
            height: 70px;
            background: #ff4a74;
            border-radius: 10px 10px 3px 3px;
        }
        .fin-left {
            left: -30px;
            transform: skewY(-30deg);
            border-radius: 50% 0 0 50%;
        }
        .fin-right {
            right: -30px;
            transform: skewY(30deg);
            border-radius: 0 50% 50% 0;
        }

        /* Windows & Catgirls */
        .window {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: #222;
            border: 5px solid #ff4a74;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .window-top { top: 65px; }
        .window-bottom { top: 135px; }

        /* Catgirl Canvas/Drawing inside windows */
        .catgirl {
            position: relative;
            width: 100%;
            height: 100%;
            background: #a3e0ff; /* Inside cabin light */
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* SVG Catgirl Art */
        .catgirl svg {
            width: 45px;
            height: 45px;
            animation: bop 3s ease-in-out infinite;
        }
        .window-bottom svg {
            animation-delay: -1.5s;
        }

        @keyframes bop {
            0%, 100% { transform: translateY(2px) rotate(-1deg); }
            50% { transform: translateY(-2px) rotate(2deg); }
        }

        /* Engine & Flame */
        .engine {
            width: 60px;
            height: 15px;
            background: #444;
            border-radius: 0 0 5px 5px;
        }

        .fire {
            width: 40px;
            height: 80px;
            background: linear-gradient(to bottom, #ffea00, #ff7b00, transparent);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            animation: flicker 0.15s ease-in-out infinite alternate;
            filter: blur(2px);
        }

        @keyframes flicker {
            0% { transform: scaleX(0.9) translateY(0); filter: drop-shadow(0 0 5px #ff7b00); }
            100% { transform: scaleX(1.1) translateY(5px); filter: drop-shadow(0 0 15px #ff3b00); }
        }

        /* Clouds Layers */
        .cloud-layer {
            position: absolute;
            bottom: -50px;
            width: 200%;
            height: 250px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50% 50% 0 0;
            filter: blur(10px);
            animation: drift 12s linear infinite;
        }

        .cloud-back {
            background: rgba(230, 210, 240, 0.4);
            height: 350px;
            animation: drift 22s linear infinite reverse;
            filter: blur(15px);
        }

        .cloud-mid {
            background: rgba(240, 245, 255, 0.6);
            height: 290px;
            animation: drift 16s linear infinite;
            filter: blur(8px);
            bottom: -70px;
        }

        @keyframes drift {
            0% { transform: translateX(-25%); }
            100% { transform: translateX(0%); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="cloud-layer cloud-back"></div>
    <div class="cloud-layer cloud-mid"></div>

    <div class="rocket-container">
        <div class="rocket-body">
            
            <div class="window window-top">
                <div class="catgirl">
                    <svg viewBox="0 0 100 100">
                        <path d="M 20 60 Q 15 30 50 25 Q 85 30 80 60 Z" fill="#ff7da7"/>
                        <polygon points="25,32 10,5 38,22" fill="#ff7da7"/> <polygon points="28,29 18,12 36,22" fill="#ffb3cb"/> <polygon points="75,32 90,5 62,22" fill="#ff7da7"/> <polygon points="72,29 82,12 64,22" fill="#ffb3cb"/> <circle cx="50" cy="55" r="30" fill="#fff0e6"/>
                        <path d="M 20 50 Q 50 30 80 50 Q 50 42 20 50 Z" fill="#ff7da7"/>
                        <path d="M 40 40 L 50 50 L 60 40" fill="none" stroke="#ff7da7" stroke-width="4"/>
                        <ellipse cx="38" cy="58" rx="5" ry="7" fill="#222"/>
                        <ellipse cx="39" cy="56" rx="2" ry="3" fill="#fff"/>
                        <ellipse cx="62" cy="58" rx="5" ry="7" fill="#222"/>
                        <ellipse cx="61" cy="56" rx="2" ry="3" fill="#fff"/>
                        <path d="M 46 68 Q 50 71 50 68 Q 50 71 54 68" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="28" cy="64" r="4" fill="#ff94b8" opacity="0.6"/>
                        <circle cx="72" cy="64" r="4" fill="#ff94b8" opacity="0.6"/>
                        <circle cx="25" cy="78" r="7" fill="#fff0e6"/>
                    </svg>
                </div>
            </div>

            <div class="window window-bottom">
                <div class="catgirl">
                    <svg viewBox="0 0 100 100">
                        <path d="M 20 60 Q 15 30 50 25 Q 85 30 80 60 Z" fill="#4a90e2"/>
                        <polygon points="25,32 8,8 38,22" fill="#4a90e2"/> 
                        <polygon points="28,29 16,14 36,22" fill="#ffb3cb"/> 
                        <polygon points="75,32 92,8 62,22" fill="#4a90e2"/> 
                        <polygon points="72,29 84,14 64,22" fill="#ffb3cb"/> 
                        <circle cx="50" cy="55" r="30" fill="#fce2c4"/>
                        <path d="M 18 48 Q 50 25 82 48 Q 50 40 18 48 Z" fill="#4a90e2"/>
                        <ellipse cx="38" cy="58" rx="6" ry="4" fill="#222"/>
                        <ellipse cx="62" cy="58" rx="6" ry="4" fill="#222"/>
                        <path d="M 32 58 Q 38 52 44 58" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
                        <path d="M 46 66 Q 50 69 50 66 Q 50 69 54 66" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="28" cy="64" r="4" fill="#ff94b8" opacity="0.6"/>
                        <circle cx="72" cy="64" r="4" fill="#ff94b8" opacity="0.6"/>
                        <circle cx="40" cy="78" r="6" fill="#fce2c4"/>
                        <circle cx="60" cy="78" r="6" fill="#fce2c4"/>
                    </svg>
                </div>
            </div>

            <div class="fin fin-left"></div>
            <div class="fin fin-right"></div>
        </div>

        <div class="engine"></div>
        <div class="fire"></div>
    </div>

    <div class="cloud-layer" style="height: 180px; background: #ffffff; bottom: -20px; animation-duration: 8s;"></div>

</body>
</html>
